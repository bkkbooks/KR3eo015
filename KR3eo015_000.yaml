body:
  text: 存想篇夫心宰性真百體攸宗用以遣意意往氣從至微而神至幽而通古昔先達默會神解假託名義接引後人此存想之術所由始也按大洞經有九宮之論乃斯術之濫觴其曰兩眉間直上卻入三分為守寸雙田謂對鼻直上下按眉際方一寸處卻向後入骨際約三分以前為守寸之城右有紫戶左有青房後二神居之故曰守寸雙田卻入一寸為明堂宮左有明童真君右有明女真君中有明鏡神君凡三神君居之卻入二寸為洞房宮頭中雖通名為洞房此則洞房之正位也左有元英君右有元白君中有黃老君凡有三神居之自此以後凡云卻入一寸二寸三寸者皆以兩眉直上處為本卻入三分便是雙田卻入一寸便是明堂卻入二寸便是洞房非雙田後再卻一寸為明堂明堂後再卻二寸為洞房也卻入三寸為丹田宮亦曰泥丸宮左有上元赤子帝君右有帝鄉凡三神居之卻入四寸為流珠宮有流珠真君居之卻入五寸為玉帝宮有玉清神母居之明堂上一寸為天庭宮此又在明堂上一層言之謂明堂之上約一寸處為天庭宮也有上清真女居之洞房上一寸為極真宮太極帝妃居之流珠上一寸為太皇宮有太上君後居之丹田上一寸為玄丹宮有中黃太乙真君居之凡一首之中有此九宮黃庭經所謂明堂金匱玉房間洞房紫極靈門戶是也宮雖有九惟守寸左面有絳臺右面有黃闕九宮真人出入皆以此為路其餘諸宮皆有前戶後戶以相通惟泥丸一宮有下門以通喉中此為大關鍵也修養之士不論四時晝夜方向欲修此者先平坐閉氣瞑目握固兩膝上乃先存想守寸見青房紫戶二大神並形如嬰兒初生之狀衣如房戶之色手執流金鈴搖動聞其聲身發赤光如雲霞之氣流於守寸宮外自此以後存想其神皆如此狀凡宮中有二神居者先左次右有三神居者先中次左次右守寸畢次明堂次洞房次泥丸次流珠次玉帝次上及天庭四宮皆如之九宮既畢復想泥丸之神並口吐赤氣灌入己口吸咽燕之以上灌丹田行吐行灌以熱為度如此則九宮之事畢矣其曰宮曰神曰衣曰鈴之類皆假設之義蓋人之腦乃精髓之海丹田乃氣之海若血氣滯塞不通必不能和合而生精氣日惟枯竭而已故常加存想使氣薰蒸透徹如雲煙在上變成雨露即腠理通瑩化為精血補腦益腎之功於是為大矣若人偶感六氣體中不快便當就寢偃臥閉氣瞑目握固存想明堂二神並亦偃臥若坐想三神皆向外長跪此一節是單想明堂或單想泥丸之想術曷法也各口吐赤氣從宮中流出漸漸纏繞我身周匝遂將所繞之氣吞而咽之覺勃勃入口下流胸腹入丹田此即存想下部之術須臾繞身赤氣即便成火火遂燒身身與火共為一體內外洞光骨肉臟腑如燃炭之狀如此則身中之氣通透上下內外無餘矣由是風寒暑濕以氣徹而散積滯凝結以氣達而消其疾自愈若能晝夜常行三五過久久自然百疾不生凡此皆假設景象以意引氣之術使上通腦髓之門下達血氣之海耳非必真有此物也學道者當自知之調氣篇天地虛空中皆氣人身虛空處皆氣故呼出濁氣身中之氣也吸入清氣天地之氣也人在氣中如魚遊水中魚腹中不得水出入即死人腹中不得氣出入亦死其理一也善攝生者必明於氣之故矣欲修調氣之術者常得密室閉戶安床暖席枕高二寸許正身偃臥瞑目握固兩足間相去五寸兩臂與體相去亦各五寸先習閉氣以鼻吸入漸漸腹滿乃閉之久不可忍乃從口細細吐出不可一呼即盡氣定復如前閉之始而十息或二十息不可忍漸熟漸多但能閉至七八十息以上則臟腑胸膈之間皆清氣之布濩矣至於純熟當其氣閉之時鼻中惟有短息一寸余所閉之氣在中如火蒸潤肺宮一縱則身如委蛻神在身外其快其美有不可言之狀蓋一氣流通表裡上下徹澤故也其所閉之氣漸消則恍然復舊此道以多為賢以久為功但能於日夜間得此一兩度久久耳目聰明精神完固體健身輕百疾消滅矣凡調氣之初務要體安氣和無與意爭若不安和且止俟和乃為之久而弗倦則善矣閉氣如降龍伏虎要須達其神理胸膈常宜虛空不可飽滿若氣有結滯不得宣流覺之便當用吐法以除之如吹噓呵嘻呬噫呼之類是也不然泉源壅遏必至逆流瘡瘍中滿之患作矣又蘇氏養生訣云每夜自三更至五更以來床上擁被盤足面東或南叩齒三十六通握固瞑目以兩手拄腰腹間閉息想心為炎火光明洞徹下入丹田待腹滿氣極即徐出氣不得令耳聞復以舌抵齒取華池水滿口低頭咽下送入丹田用意精猛令津與氣谷谷然有聲徑至丹田畢再依前為之凡九閉息三咽津而止然後以兩手摩熱摩兩腳心即湧泉穴及腰脊兩旁即腎堂皆冷熱徹次以兩手摩尉眼面耳項皆令極熱仍按提鼻梁左右七下梳頭百餘梳而臥熟睡至明蘇氏一段兼按摩法按摩篇夫存想者以意御氣之道自內而達外者也按摩者開關利氣之道自外而達內者也故醫家行之以佐宣通而攝生者貴之以泄壅滯凡有行者當在子後午前之時平坐東向以兩手大指按拭兩目過耳門使兩掌交會於項後如此三九遍次存想目中各有紫青絳三色氣如雲霞鬱郁浮出面前再依前按拭三九遍復存想面前雲氣暉暉霍霍灌入瞳子因咽華池之液二十口乃開目以為常坐起皆可行之不必拘時一年許耳目便聰明久為之徹視數里聽於絶響也面上常欲得兩手摩拭之使熱則氣常流行作時先將兩掌摩熱然後以掌摩拭面目高下隨形皆使極匝如此三五過卻度手於項後及兩鬢更互摩發如櫛頭之狀亦數十過令人面有光澤皺斑不生發不白脈不浮外久行五年不輟色如少女所謂山川行氣常盈不涸而木石榮潤是也耳欲得數按仰其左右令人聰徹鼻亦欲按其左右無數令人氣平又常以兩手按鼻及兩目之眥上下按之無數閉氣為之氣通即止吐而復始亦三九遍能恆為之鼻聞百步眼乃洞觀黃庭經曰天中之嶽精謹修靈宅既清玉帝遊通利道路無終休此之謂也凡人小有不快即須按摩按捺令百節通利泄其邪氣凡人無問有事無事須日要一度令人自首至足但系關節處用手按捺各數十次謂之大度關先百會穴次頭四周次兩眉外次目眥次鼻準次兩耳孔及耳後皆按之次風池次項左右皆揉之次兩肩胛次臂骨縫次肘骨縫次腕次手十指皆捻之次脊背或按之或捶震之次腰及腎堂皆搓之次胸乳次腹皆揉之無數次髀骨捶之次兩膝次小腿次足踝次十趾次足心皆兩手捻之若常能行此則風氣時去不住腠理是謂泄氣又常向腎堂及兩足心臨臥時令童子用手搓摩各以熱透表裡為度摩腎堂熱則腎氣透而易於生精摩足心熱則湧泉穴透而血不下滯導引篇莊子曰吹詬呼吸吐故納新熊經鳥伸為壽而已矣此導引之士養形之人彭祖壽考者之所好也由是論之導引之術傳自上世其來久矣故曰彭祖之所好其法自修養家醫家所談無慮數百首今取其要約切當者十六條參之諸論大概備矣凡行導引法常以夜半及平旦將起之時為之此時氣清腹虛行之益人先閉目握固冥心端坐叩齒三十六通即以兩手抱項左右宛轉二十四此可以去兩脅積聚風邪復以兩手相叉虛空托天仰手按頂二十四此可以除胸膈間邪氣復以兩手心掩兩耳卻以第二指壓第三指彈擊腦後二十四此可除風池邪氣復以兩手相捉按左膝左捩身按右膝右捩身二十四此可以去肝家風邪復以兩手一向前一向後如挽五石弓狀二十四此可以去臂腋積邪復大坐展兩手紐項左右反顧肩膊隨轉二十四此可以去脾家積邪復兩手握固並拄兩肋擺撼兩肩二十四此可以去腰肋間風邪復以兩手交捶臂及膊反捶背上連腰股各二十四此可以去四肢胸臆之邪復大坐斜身偏倚兩手齊向上如排天狀二十四此可以去肺間積聚之邪復大坐伸腳以兩手向前低頭攀腳十二次卻鉤所伸腳屈在膝上按摩之二十四此可以去心胞絡邪氣復以兩手據地縮身曲脊向上十三舉此可以去心肝中積邪復起立徐行兩手握固左足前踏左手擺向前右手擺向後右足前踏右手擺向前左手擺向後二十四此可以去兩肩俞之邪復以手向背上相捉低身徐徐宛轉二十四此可以去兩脅之邪復以足相紐而行前進十數步復高坐伸腿將兩足紐向內復紐向外各二十四以上二條可以去兩膝及兩足間風邪行此十六節訖復端坐閉目握固冥心以舌柱上顎攪取津液滿口漱三十六次作谷谷聲咽之復閉氣想丹田火自下而上遍燒身體內外蒸熱乃止按老子導引四十二勢婆羅門導引十二勢赤松子導引法十八勢鍾離導引法八勢胡見素五臟導引法十二勢在諸法中頗為妙解然撮其切要不過於此學者能日行一二過久久體健身輕百邪皆除走及奔馬不復疲乏矣形景篇腑臟內景各有區別達以行術養生之要參稽古論述此明徵凡人咽喉二竅同出一脘異塗施化喉在前主出納咽在後主吞咽喉系堅空連接肺本為氣息之路呼吸出入下通心肝之竅以激諸脈之行氣之巨海也咽系柔空下接胃本為飲食之路水食同下並歸胃中乃水穀之海也二道並行各不相犯蓋飲食必歷氣口而下氣口有形謂之會厭當飲食方咽會厭即垂厥口乃閉故水穀下咽了不犯喉言語呼吸則會厭開張當食言語則水穀乘氣送入喉脘遂戕刺而咳矣喉之下為肺兩葉白瑩謂為華蓋以覆諸臟虛如蜂窠下無透竅故吸之則滿呼之則虛一呼一吸消息自然無有窮已乃清濁之交運人身之橐籥也肺之下為心心有系絡上屬於肺肺受清氣下乃灌注外有胞絡裹赤黃脂其象尖長圓扁其色黑青赤黃其中竅數多寡各異迥不相同上通於舌下無透竅惟旁有系一脈下連於腎而注氣焉心之下有膈膜與脊脅周回相著遮蔽濁氣使不得上薰心肺所謂膻中也膈膜之下有肝肝有獨葉者有二三葉者其系亦上絡心肺為血之海上通於目下亦無竅肝短葉下有膽膽有汁藏而不瀉此喉之一竅施氣運化薰蒸流行以成脈絡者如此咽至胃長一尺六寸通謂之咽門咽下有膈膜膈膜之下有胃盛受飲食而腐熟之其左有脾與胃同膜而附其上其色如馬肝赤紫其形如刀鐮聞聲則動動則磨胃食乃消化胃之下左有小腸後肘脊膂左環回周疊積其注於回腸者外附臍上共盤十六曲右有大腸即回腸當臍左環回周疊積而下亦盤十六曲廣腸附脊以受回腸左環疊積下闢乃出滓穢之路廣腸左側為膀胱乃津液之府五味入胃其精液上升化為血脈以成骨髓津液之餘留入下部得氣海之氣施化小腸滲出膀胱滲入而溲便注泄矣凡胃中腐熟水穀其精氣自胃之上口曰賁門傳於肺肺播於諸脈其滓穢自胃之下口曰幽門傳於小腸至小腸下口曰闌門泌別其汁清者滲出小腸而滲入膀胱滓穢之濁則轉入大腸膀胱赤白瑩淨外無所入之竅全假氣化施行氣不能化則閟隔不通而為病矣三焦有名無形主持諸氣以象三才故呼吸升降水穀往來皆待此通達上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行傳胃中谷味之精氣於肺肺播於諸脈中焦在胃中脘不上不下主腐熟水穀泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經遂命曰營氣下焦如瀆其氣起於胃下脘別回腸注於膀胱主出而不納此脾胃大小腸三焦乃咽之一竅資生血氣轉化糟粕而入出如此腎有二精所舍也生於脊膂十四椎下兩旁各一寸五分形似豇豆相併而曲附於脊外有黃脂包裹里白外黑各有帶二條上條繫於心下條過屏翳穴後趨脊骨下有大骨在脊骨之端如半手許中有兩穴是腎帶經過處上行夾脊至胸中是為髓海五臟之真惟腎為根上下有竅穀味之液化而為精人乃久生腎虛精絶其生乃滅凡人腎虛水不足也補以燥藥以火煉水其精乃爍攝生者觀於腎之神理則夭壽之消息亦思過半矣飲食篇人知飲食所以養生不知飲食失調亦所以害生故能消息使適其宜是謂賢哲悟於未病凡人飲食無論四時常欲溫暖夏月伏陰在內暖食尤宜不欲苦飽飽則筋脈橫解腸澼為痔因而大飲則氣乃暴逆養性之道不欲食後便臥及終日穩坐皆能凝結氣血久即損壽食後常以手摩腹數百遍仰面呵氣數百口趂趄緩行數百步謂之消食食後便臥令人患肺氣頭風中痞之疾蓋榮衛不通氣血凝滯故爾故食訖當行步躊躇有所修為乃佳語曰流水不腐戶樞不蠹以其動然也食飽不得速步走馬登高涉嶮恐氣滿而激致傷臟腑不欲夜食脾好音聲聞聲即動而磨食日入之後萬響都絶脾乃不磨食之即不易消不消即損胃損胃則翻翻即不受穀氣不受即多吐多吐則轉為翻胃之疾矣食欲少而數不欲頓而多常欲令飽中飢飢中飽為善爾食熱物後不宜再食冷物食冷物後不宜再食熱物冷熱相激必患牙齒瓜果不時禽獸自死及生鮓煎火之肉與夫多膩難消粉粥冷淘之物皆能生痰生瘡瘍生癥癖並不宜食五味入口不欲偏多多則隨其臟腑各有所損故咸多傷心甘多傷腎辛多傷肝苦多傷肺酸多傷脾內經曰多食鹹則脈凝澀而變色多食苦則皮稿毛拔多食辛則筋急而爪枯多食酸則肉胝皺而唇揭多食甘則骨肉痛而發落偏之為害如此故上者淡泊其次中和飲食之大節也酒飲少則益人過多即損人氣暢而止可也飲少則能引滯氣導藥力潤肌膚益顏色通榮衛闢穢惡過多而醉則肝浮膽橫諸脈衝激由之敗腎毀筋腐骨消胃久之神散魄冥不能飲食獨與酒宜去死無日矣飽食之後尤宜忌之飲覺過多吐之為妙飲酒後不可飲冷水冷茶被酒引入腎中停為冷毒多時必腰膝沉重膀胱冷痛水腫消渴攣臂之疾作矣酒後不得風中坐臥袒肉操扇此時毛孔盡開風邪易入感之令人四肢不遂不欲極飢而食食不可過飽不欲極渴而飲飲不可過多食過多則結積飲過多則成痰癖故曰大渴不大飲大飢不大食恐血氣失常卒然不救也荒年餓莩飽食即死是驗也嗟乎善養生者養內不善養生者養外養內者安恬臟腑調順血脈使一身之氣流行沖和百疴不作養外者恣口腹之欲極滋味之美窮飲食之樂雖肌體充腴容色悅澤而酷烈之氣內蝕臟腑形神虛矣安能保合太和以臻遐齡莊子曰人之可畏者衽席飲食之間而不知為之戒過也其此之謂乎居處篇左傳曰土厚水深居之不疾淮南子曰堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜山氣多男澤氣多女水氣多喑風氣多聾林氣多癃木氣多傴濕氣多腫石氣多力陰氣多癭暑氣多夭寒氣多壽穀氣多痹立氣多狂野氣多仁陵氣多貪輕土人利重土人遲清水音小濁水音大湍水人輕遲水人重中土多聖黃帝問曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也岐伯曰東南陽也其精降於下西北陰也其精奉於上是以地有高下氣有溫涼高者氣寒下者氣熱帝曰其於壽夭何如岐伯曰陰精所奉其人壽陽精所降其人夭帝曰一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之高者其氣壽下者其氣夭由是觀之人之壽夭美惡由於水土之氣如此善養生者擇地而居此為至要或曰古者巢居穴處而人多壽何也曰古人淳朴寡於嗜欲此實壽本況巢居則高迥而多寒穴處則固密而無風濕之患豈不得壽今之居處當何如曰由水深土厚陰精所奉之説觀之居處高聳於生乃宜曰生之所寓人有定區高山峻土惡乎能齊曰有山阜則就山阜臨平漫則起樓臺庶乎日襲陰氣而不為陽泄矣古謂仙人好樓居得非以是乎哉雖然坐臥之處必須固密若值細隙之風其毒中人尤甚久之或半身不遂或角弓反張或言語謇澀蓋身既中風鬼邪易入衆病總集遂致夭其天年爾是故窪下之地不可處慎其濕也疏漏之地不可處慎其風也久閉之室不可處慎其土氣之惡也幽冥之壑不可處慎其陰鬱之毒也四者皆能病人養生之士尤宜避之也房中篇天地氤氳萬物化醇男女媾精萬物化生此造化之源性命之根本也故人之大欲亦莫切於此嗜而不知禁則侵克年齡蠶食精魄暗然弗覺而元神真氣去矣豈不可哀惟知道之士禁其太甚不至杜絶雖美色在前不過悅目暢志而已決不肯恣其情欲以伐性命或問抱朴子曰傷生者豈非色欲之間乎抱朴子曰然長生之要其在房中上士知之可以延年祛病其次不以自伐下愚縱欲損壽而已是以古人於此恆有節度二十以前二日復二十以後三日復三十以後十日復四十以後月復五十以後三月復六十以後七月復又曰六十閉戶蓋時加撙節保惜真元以為一身之主命不然雖勤於吐納導引服餌之術而根本不固亦終無益內經曰能知七損八益七者女子之血八者男子之精則血氣精氣二者可調不知用此則早衰之節也故年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老智者有餘自性而先行故有餘愚者不足察行而後學故不足有餘則耳目聰明身體輕強老者益壯壯者益治蓋謂男精女血若能使之有餘則形氣不衰而壽命可保矣不然竅漏無度中干以死非精離人人自離精也可不戒哉養生之士忌其人者有九或年高大或唇薄鼻大或齒疏發黃或痼疾或情性不和或莎苗強硬或聲雄或肉澀肢體不膏或性悍妒忌皆能損人並不宜犯之忌其時者十有一醉酒飽食遠行疲乏喜怒未定女人月潮沖冒寒暑疾患未平大小便訖新沐浴後犯畢出行無情強為皆能使人神氣昏潰心力不足四體虛羸腎臟怯弱六情不均萬病乃作特宜慎之至於天地晦冥日月薄食疾風甚雨雷電震怒此陰陽大變六氣失常之時犯之不惟致疾且褻汗神明倘成子女形必不周雖生而不育矣嗟乎幃箔之情易綰而難斷不可不以智慧決也佛書曰諸苦所因貪欲為本貪欲不滅苦亦不滅苦不滅則生滅矣養生者惡可不以智慧決哉四時篇凡人呼吸出入皆天地之氣故風寒暑濕之暴偶一中人人不勝天則留而為病故隨時加攝使陰陽中度是謂先幾防於未病春月陽氣閉藏於冬者漸發於外故宜發散以暢陽氣內經云春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變故人當二月以來摘取東引桃枝並葉各一握水三升煎取二升以來早朝空心服之即吐卻心膈痰飲宿熱即除不為害春深稍宜和平將息綿衣晚脫不可令背寒寒即傷肺鼻塞咳嗽但覺熱即去之覺冷即加之加減俱要早起之時若於食後日中恐致感冒風寒春不可衣薄令人傷寒霍亂消渴頭痛春凍未泮衣欲下厚而上薄夏月人身陽氣發外伏陰在內是人脫精神之時特忌下利以泄陰氣內經云夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使英華成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧故人常宜宴居靜坐節減嗜欲調和心志此時心主腎衰精化為水至秋乃凝尤須保嗇以固陰氣常食熟物使腹中溫暖生瓜果茄冰水冷淘粉粥蜂蜜尤不可食食多秋時必患痢瘧勿以冷水沐浴洗手面淋背使人得虛熱眼暗筋脈厥逆霍亂轉筋陰黃之疾勿當風臥勿眠中使人揮扇汗體毛孔開展風邪易入犯之使人患風痹不仁手足不遂言語謇澀之疾年壯雖不即為害亦種病根氣衰之人如桴鼓應響矣醉中尤宜忌之秋月當使陽氣收斂不宜吐及發汗犯之令人臟腑消鑠內經云秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為饗泄若知夏時多食冷物及生瓜果稍多即宜以童子小便二升並大腹檳榔五顆細切煎取八合下生薑汁一合和臘雪三分早為空心分為兩服瀉三兩行夏月所食冷物及膀胱宿水悉為驅逐而出即不為患此藥是乘氣湯雖老年之人亦宜服之瀉後兩三日以薤白粥加羊腎空心補之勝服補藥冬月天地閉血氣藏伏陽在內心膈多熱切忌發汗以泄陽氣內經云冬三月謂之閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥故人當時服浸酒之藥以迎陽氣雖然亦不可過暖綿衣當晚著使漸漸加厚雖大寒不得向火烘炙甚損人目睛且手足能引火氣入心使人心臟燥熱衣服亦不宜大炙極暖冬月天寒陽氣在內已自鬱熱若更加之炙衣重裘近火醉酒則陽氣太甚若遇春寒閉塞之久不即發散至春夏之交陰氣既入不能攝運陽氣必致有時行熱疾甚者狂走妄語切宜忌之故寒熱適中此為至要凡冬不欲極溫夏不欲極涼不欲露臥星下不欲眠中操扇大寒大熱大風大雨皆不欲冒之秋冬溫足凍腦其春夏腦足具凍故曰天有四時五行以生寒暑燥濕風人有五臟五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽喜怒不節寒暑過度生乃不固此之謂也雜忌篇夫養生者臥起有四時之早晚飲食有至和之常制調利關節有導引之方流行榮衛有吐納之術忍喜怒以養陰陽之氣節嗜欲以固真元之精保形延壽可謂備矣使禁忌之理知有未周雖云小節之常亦為大道之纍故事有侵性不可不慎者古語云一日之忌暮無飽食一月之忌暮無大醉一歲之忌暮無遠行終身之忌暮常護氣蓋謂暮乃偃息之時人若飽食則腹中空虛之地少而氣之居內以養形者寡癖瘕壅滯之患作矣故暮當忌飽食謂之一日蓋日日慎之也酒毒酷悍飲至大醉則毒氣必壞真氣況暮醉而臥氣溢形止腸胃由之腐爛經絡以之橫解一時不覺久乃成疾雖少壯之人不可使一月之內有此一醉也況中年以往之人乎暮而遠行不惟有外觸之虞山川嵐霧夜陰鬱發冒之亦能損人真氣故皆宜忌之以上三者不行則真氣常保無失是終身能護其氣矣又久視傷血久臥傷氣久立傷骨久行傷筋久坐傷肉大抵人之形氣時動時靜其機運而不滯久於動靜未免有傷也睡不厭踧覺不厭舒踧者曲膝卷股以左右肋側臥修養家所謂獅子眠是也如此則氣海深滿丹田常暖腎水易生益人弘多舒體而臥則氣直而寡畜神散而不潛故臥惟覺時可舒體耳凡人覺大小便即行勿忍之忍小便則膝冷成痹忍大便則成氣痔小便勿努努久令人兩膝冷痛大便勿努努久令人腰痛目昏氣逆急故也並宜任其自然凡人大勞則力乏絶大飢則臟腑脈絡有竭大飽則腠理氣溢大渴則經脈蹶亂大醉則精神散越大熱則陰氣解脫大寒則血脈凝結並能致疾凡心有愛不用深愛凡心有憎不用深憎凡喜至而心不蕩凡怒過而情不留並能養神益壽學道之功至此乃至人對景忌情之妙聖人養心定性之學修養之術不足以盡之也凡夜非調氣之時常習閉口而睡為佳口開即失真氣且邪從口入更牙齒為出入之氣所觸後必病齒凡睡而張口者牙齒無不早落可以驗之濕衣及汗衣切不可久著能傷人心肺之系及發瘡瘍十步直牆下勿得順臥風峻利能令人發癲及體重凡大汗及新浴出勿赤體勿即脫衣當風風入腠理則成半身不遂夜臥當耳處勿令有孔隙令人風吹耳聾頭項亦如之夜臥勿覆其頭得長壽以常有天地之清氣入腹中也古之善攝生者居常少思慮忍嗜欲平喜怒寡憂樂淡好惡世之美麗貴重物事舉不足以入其心由是志意舒暢形體安和血氣順利度百歲而後去矣寇氏曰人之未聞道者放逸其心迷於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之疾矣極力勞形燥暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫涼失度久坐久臥太飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必死嗚呼是皆弗思妄行而自取之也衛生之士能慎此五者可以終身無苦矣經曰不治已病治未病其此之謂與
