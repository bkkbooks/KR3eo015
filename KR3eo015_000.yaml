front:
  text: 序河濱丈人曰養生之説其來尚矣神農嘗草軒皇立論祕啓造化德濟含靈天人之蘊於是昭布矣逮及後世論述漸廣高者蕩入仙筌卑者專守方餌不知調息攝性緩形節欲乃人理之隱訣性命之樞機焉余自壯年以來頗講此術緣動達形緣虛達氣下不著伎上不泥仙似於攝生之祕超然有得乃會綜群文詮取要旨以著論十篇用發蒙學嗟乎修身體道弘濟蒸人治世之事業也養氣完形欲寡嗇精保生之大節也是故生之道有餘而後治之道斯立尼父慎疾禮貴養生求諸會通豈復異旨要在知音察之爾後序敘曰世言方技略者類以非經闢之固也然經以止道道以息邪故有殊途同歸而大義不詭於聖人則固弗可詘也已今觀河濱丈人所纂攝生要義其存想篇則務專精氣洞與神參要不可以邪汨之一耳至云守寸及諸景象所見皆假設之義則與所謂蕩入仙筌者又大不侔其諸篇亦皆制外養中順生節適之道何償喪肝膽遺耳目嗒然忘其形而與世為罔兩者倫也噫達生者類出於是其去夭昏札瘥而極蕃祉耆耋者固其所已又安知不為經之佐使也哉河濱丈人為誰大司馬浚川公也公固志存天下而思躋之仁壽之域以廣熙和之化者則於是乎端有賴也敬序上蔡後學張惟恕書
